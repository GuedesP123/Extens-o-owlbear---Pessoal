<!DOCTYPE html>
<html><body>
<script type="module">
import OBR from "https://esm.sh/@owlbear-rodeo/sdk@3.1.0";

const ID  = "com.starofthecity.initiative";
const BASE = "https://guedesp123.github.io/Extens-o-owlbear---Pessoal";
const META_KEY = `${ID}/state`;
const POP_ID   = `${ID}/token-pop`;

OBR.onReady(() => {
  OBR.contextMenu.create({
    id: `${ID}/ctx`,
    icons: [
      {
        icon: `${BASE}/icon.svg`,
        label: "Iniciativa SotC — Adicionar / Editar",
        filter: { every: [{ key: "layer", value: "CHARACTER" }] },
      },
    ],
    async onClick(context, elementId) {
      const item = context.items[0];
      if (!item) return;
      await OBR.popover.open({
        id: POP_ID,
        url: `${BASE}/token-panel.html?itemId=${encodeURIComponent(item.id)}`,
        height: 400,
        width: 340,
        anchorElementId: elementId,
        anchorOrigin:    { horizontal: "RIGHT", vertical: "TOP" },
        transformOrigin: { horizontal: "LEFT",  vertical: "TOP" },
      });
    },
  });
});
</script>
</body></html>
