<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Star of the City — Iniciativa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15110d;
    --bg-panel:#1c1812;
    --bg-card:#221d16;
    --bg-card-2:#272019;
    --line:#4a3a22;
    --line-soft:#332a1c;
    --brass:#d9a23b;
    --brass-dim:#8a611f;
    --brass-bright:#f0c773;
    --ink:#ece3cf;
    --ink-dim:#a89a7c;
    --ink-faint:#6f6450;
    --enemy:#a4453f;
    --enemy-dim:#5c2723;
    --pc:#3f8a8f;
    --pc-dim:#234d50;
    --ally:#7a8c4a;
    --ally-dim:#424d28;
    --bind:#7e6fc7;
    --accel:#4fa0e0;
    --paralyze:#bdbdbd;
    --danger:#c0463f;
    --radius:8px;
    --radius-sm:5px;
  }
  *{box-sizing:border-box;}
  html,body{
    height:100%;
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    font-size:13px;
  }
  body{
    background-image:
      radial-gradient(ellipse at top, rgba(217,162,59,0.06), transparent 60%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 4px);
  }
  #app{
    display:flex;
    flex-direction:column;
    height:100%;
    max-height:100vh;
  }
  h1,h2,h3{
    font-family:'Cinzel',serif;
    margin:0;
    letter-spacing:0.02em;
  }
  button{
    font-family:inherit;
    cursor:pointer;
  }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }

  /* ---------- header ---------- */
  .topbar{
    flex:0 0 auto;
    padding:12px 14px 10px;
    border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg, var(--bg-panel), var(--bg));
  }
  .topbar-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .title{
    font-size:16px;
    color:var(--brass-bright);
    text-shadow:0 1px 0 rgba(0,0,0,0.6);
  }
  .title small{
    display:block;
    font-family:'Inter',sans-serif;
    font-size:10px;
    color:var(--ink-faint);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-top:2px;
  }
  .scene-pill{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:999px;
    padding:4px 10px;
    font-size:11px;
    color:var(--ink-dim);
    white-space:nowrap;
  }
  .scene-pill b{ color:var(--brass); font-family:'Cinzel',serif; }

  .btn{
    border:1px solid var(--line);
    background:var(--bg-card);
    color:var(--ink);
    border-radius:var(--radius-sm);
    padding:7px 12px;
    font-size:12px;
    font-weight:600;
    transition:filter .12s ease, transform .05s ease;
  }
  .btn:hover{ filter:brightness(1.18); }
  .btn:active{ transform:translateY(1px); }
  .btn:focus-visible{ outline:2px solid var(--brass); outline-offset:1px; }
  .btn-brass{
    background:linear-gradient(180deg, var(--brass), var(--brass-dim));
    border-color:var(--brass-dim);
    color:#241a08;
  }
  .btn-ghost{
    background:transparent;
    border-color:var(--line);
    color:var(--ink-dim);
  }
  .btn-danger{
    background:var(--enemy-dim);
    border-color:var(--enemy);
    color:#f3d9d6;
  }
  .btn-sm{ padding:4px 8px; font-size:11px; border-radius:4px; }
  .btn-icon{
    width:24px; height:24px; padding:0;
    display:inline-flex; align-items:center; justify-content:center;
    border-radius:50%;
    font-size:13px;
    line-height:1;
  }

  .actions-row{
    display:flex;
    gap:6px;
    margin-top:10px;
  }
  .actions-row .btn{ flex:1; }

  /* ---------- track ---------- */
  .track-section{
    flex:0 0 auto;
    padding:10px 14px;
    border-bottom:1px solid var(--line-soft);
    background:var(--bg-panel);
  }
  .section-label{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--ink-faint);
    margin-bottom:7px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .track{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    min-height:30px;
  }
  .track-empty{
    color:var(--ink-faint);
    font-size:11.5px;
    font-style:italic;
    padding:4px 0;
  }
  .die-badge{
    position:relative;
    width:38px; height:38px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    background:radial-gradient(circle at 32% 28%, var(--brass-bright), var(--brass) 55%, var(--brass-dim) 100%);
    border:2px solid #5c4118;
    color:#221704;
    font-weight:700;
    font-size:15px;
    box-shadow:0 2px 3px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.35);
    cursor:pointer;
    transition:transform .08s ease, filter .1s ease;
  }
  .die-badge:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  .die-badge:active{ transform:translateY(0); }
  .die-badge .die-tag{
    position:absolute;
    bottom:-7px;
    font-family:'Inter',sans-serif;
    font-size:8px;
    font-weight:700;
    color:var(--ink);
    background:#000;
    border-radius:3px;
    padding:0 3px;
    max-width:46px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    border:1px solid var(--line);
  }
  .die-badge.type-enemy{ border-color:#5c2320; }
  .die-badge.type-enemy .die-tag{ background:var(--enemy-dim); border-color:var(--enemy); }
  .die-badge.type-pc .die-tag{ background:var(--pc-dim); border-color:var(--pc); }
  .die-badge.type-ally .die-tag{ background:var(--ally-dim); border-color:var(--ally); }

  .standby-row{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-items:center;
  }
  .standby-chip{
    display:flex;
    align-items:center;
    gap:4px;
    background:var(--bg-card);
    border:1px dashed var(--accel);
    border-radius:999px;
    padding:3px 4px 3px 9px;
    font-size:11px;
  }
  .standby-chip .val{ font-weight:700; color:var(--accel); }

  /* ---------- add form ---------- */
  .add-toggle{
    flex:0 0 auto;
    width:100%;
    text-align:left;
    padding:9px 14px;
    background:var(--bg-panel);
    border:none;
    border-bottom:1px solid var(--line-soft);
    color:var(--brass);
    font-size:12px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .add-toggle:hover{ background:var(--bg-card); }
  .add-form{
    flex:0 0 auto;
    padding:12px 14px 14px;
    background:var(--bg-card);
    border-bottom:1px solid var(--line-soft);
    display:none;
  }
  .add-form.open{ display:block; }
  .field-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-bottom:8px;
  }
  .field-grid.full{ grid-template-columns:1fr; }
  label{
    display:block;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-faint);
    margin-bottom:3px;
  }
  input[type=text], input[type=number], select{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    color:var(--ink);
    padding:6px 8px;
    font-size:12.5px;
    font-family:inherit;
  }
  input:focus, select:focus{ outline:2px solid var(--brass); outline-offset:0; border-color:var(--brass); }
  .type-toggle{ display:flex; gap:4px; }
  .type-toggle button{
    flex:1;
    border:1px solid var(--line);
    background:var(--bg);
    color:var(--ink-dim);
    padding:6px 4px;
    font-size:11px;
    border-radius:var(--radius-sm);
    font-weight:600;
  }
  .type-toggle button.active.type-enemy{ background:var(--enemy-dim); border-color:var(--enemy); color:#f3d9d6; }
  .type-toggle button.active.type-pc{ background:var(--pc-dim); border-color:var(--pc); color:#d3f0f0; }
  .type-toggle button.active.type-ally{ background:var(--ally-dim); border-color:var(--ally); color:#e6f0c9; }

  /* ---------- list ---------- */
  .list-wrap{
    flex:1 1 auto;
    overflow-y:auto;
    padding:10px 14px 16px;
    display:flex;
    flex-direction:column;
    gap:9px;
  }
  .empty-state{
    margin-top:20px;
    text-align:center;
    color:var(--ink-faint);
    font-size:12px;
    line-height:1.6;
  }
  .empty-state .big{ font-size:26px; display:block; margin-bottom:6px; opacity:.6; }

  .card{
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,0.4);
  }
  .card.type-enemy{ border-left:3px solid var(--enemy); }
  .card.type-pc{ border-left:3px solid var(--pc); }
  .card.type-ally{ border-left:3px solid var(--ally); }
  .card.exhausted{ opacity:0.6; }

  .card-head{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 10px;
    background:var(--bg-card-2);
    border-bottom:1px solid var(--line-soft);
  }
  .card-name{
    flex:1;
    background:transparent;
    border:none;
    color:var(--ink);
    font-weight:700;
    font-size:13px;
    font-family:'Cinzel',serif;
    padding:2px 4px;
    min-width:0;
  }
  .card-name:focus{ outline:1px solid var(--brass); border-radius:3px; }
  .type-dot{
    width:8px; height:8px; border-radius:50%; flex:0 0 auto;
  }
  .type-dot.type-enemy{ background:var(--enemy); }
  .type-dot.type-pc{ background:var(--pc); }
  .type-dot.type-ally{ background:var(--ally); }

  .card-body{ padding:9px 10px 10px; }
  .stat-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:8px;
  }
  .stat-field{
    display:flex;
    align-items:center;
    gap:4px;
    background:var(--bg);
    border:1px solid var(--line-soft);
    border-radius:var(--radius-sm);
    padding:3px 6px;
  }
  .stat-field span.lbl{
    font-size:9.5px;
    color:var(--ink-faint);
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .stat-field input, .stat-field select{
    width:42px;
    background:transparent;
    border:none;
    color:var(--ink);
    padding:2px;
    font-size:12px;
    text-align:center;
  }
  .stat-field select{ width:auto; }
  .stat-field input:focus, .stat-field select:focus{ outline:none; }

  .status-toggle{
    display:flex;
    align-items:center;
    gap:3px;
    border:1px solid var(--line-soft);
    border-radius:var(--radius-sm);
    padding:3px 6px;
    background:var(--bg);
    font-size:11px;
  }
  .status-toggle.on.bind{ border-color:var(--bind); background:rgba(126,111,199,0.15); }
  .status-toggle.on.accel{ border-color:var(--accel); background:rgba(79,160,224,0.15); }
  .status-toggle.on.paralyze{ border-color:var(--paralyze); background:rgba(189,189,189,0.15); }

  .die-row{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    align-items:center;
  }
  .die-chip{
    display:flex;
    align-items:center;
    gap:5px;
    border-radius:999px;
    padding:3px 4px 3px 9px;
    font-size:11.5px;
    font-weight:700;
    border:1px solid var(--line-soft);
  }
  .die-chip.available{
    background:linear-gradient(180deg, rgba(217,162,59,0.28), rgba(217,162,59,0.1));
    border-color:var(--brass-dim);
    color:var(--brass-bright);
    cursor:pointer;
  }
  .die-chip.used{
    background:transparent;
    color:var(--ink-faint);
    text-decoration:line-through;
    opacity:0.7;
  }
  .die-chip.standby{
    background:rgba(79,160,224,0.1);
    border:1px dashed var(--accel);
    color:var(--accel);
  }
  .die-chip button{
    background:rgba(0,0,0,0.3);
    border:none;
    color:inherit;
    width:18px; height:18px;
    border-radius:50%;
    font-size:10px;
    display:flex; align-items:center; justify-content:center;
    line-height:1;
  }
  .die-chip button:hover{ filter:brightness(1.4); }

  .card-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:9px;
    padding-top:8px;
    border-top:1px solid var(--line-soft);
  }
  .card-footer .left{ display:flex; gap:6px; }

  /* ---------- legend ---------- */
  .legend{
    display:none;
    padding:8px 10px;
    margin-top:8px;
    background:var(--bg);
    border:1px solid var(--line-soft);
    border-radius:var(--radius-sm);
    font-size:11px;
    color:var(--ink-dim);
    line-height:1.7;
  }
  .legend.open{ display:block; }
  .legend b{ color:var(--ink); }

  /* ---------- fallback screens ---------- */
  .fallback{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:24px;
    gap:8px;
  }
  .fallback .big{ font-size:34px; opacity:0.7; }
  .fallback h2{ color:var(--brass-bright); font-size:15px; }
  .fallback p{ color:var(--ink-dim); font-size:12px; max-width:280px; line-height:1.6; margin:0; }
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import OBR from "https://esm.sh/@owlbear-rodeo/sdk@3.1.0";

const META_KEY = "com.starofthecity.initiative/state";
const DICE_SIZES = [4, 6, 8, 10, 12];
const TYPE_LABEL = { pc: "Jogador", ally: "Aliado", enemy: "Inimigo" };

const app = document.getElementById("app");

let state = defaultState();
let uiFlags = { addOpen: false, legendOpen: false, confirmDelete: null };

function defaultState() {
  return { sceneCount: 0, combatants: [] };
}

function uid() {
  return (crypto.randomUUID ? crypto.randomUUID() : "id-" + Math.random().toString(36).slice(2) + Date.now());
}

/* ---------------- dice math ---------------- */

function rollOne(size) {
  return 1 + Math.floor(Math.random() * size);
}

function rollCombatantDice(c) {
  const dice = [];
  for (let i = 0; i < c.diceCount; i++) {
    let value, breakdown;
    if (c.paralyze) {
      value = 1;
      breakdown = "Paralisado — travado em 1";
    } else {
      const base = rollOne(c.diceSize);
      let total = base + Number(c.bruto || 0) + Number(c.accel || 0) - Number(c.bind || 0);
      value = Math.max(1, total);
      const parts = [`d${c.diceSize}: ${base}`];
      if (c.bruto) parts.push(`${c.bruto > 0 ? "+" : ""}${c.bruto} bruto`);
      if (c.accel) parts.push(`+${c.accel} aceleração`);
      if (c.bind) parts.push(`-${c.bind} bind`);
      if (total < 1) parts.push("ajustado ao mínimo de 1");
      breakdown = parts.join(", ");
    }
    dice.push({ id: uid(), value, status: "available", breakdown });
  }
  return dice;
}

/* ---------------- persistence ---------------- */

async function persist() {
  try {
    await OBR.scene.setMetadata({ [META_KEY]: state });
  } catch (err) {
    console.error("Falha ao salvar estado na cena:", err);
  }
}

function mutate(fn) {
  fn(state);
  render();
  persist();
}

/* ---------------- actions ---------------- */

function addCombatant(data) {
  const c = {
    id: uid(),
    name: data.name || "Combatente",
    type: data.type || "pc",
    diceCount: clamp(data.diceCount, 1, 10),
    diceSize: data.diceSize,
    bruto: data.bruto || 0,
    bind: Math.max(0, data.bind || 0),
    accel: Math.max(0, data.accel || 0),
    paralyze: false,
    dice: [],
  };
  c.dice = rollCombatantDice(c);
  mutate((s) => s.combatants.push(c));
}

function removeCombatant(id) {
  mutate((s) => { s.combatants = s.combatants.filter((c) => c.id !== id); });
}

function rerollCombatant(id) {
  mutate((s) => {
    const c = s.combatants.find((c) => c.id === id);
    if (c) c.dice = rollCombatantDice(c);
  });
}

function rollNewScene() {
  mutate((s) => {
    s.sceneCount += 1;
    for (const c of s.combatants) c.dice = rollCombatantDice(c);
  });
}

function updateField(id, field, rawValue) {
  mutate((s) => {
    const c = s.combatants.find((c) => c.id === id);
    if (!c) return;
    if (field === "name") c.name = rawValue;
    else if (field === "type") c.type = rawValue;
    else if (field === "diceSize") c.diceSize = Number(rawValue);
    else if (field === "diceCount") c.diceCount = clamp(Number(rawValue), 1, 10);
    else if (field === "bruto") c.bruto = Number(rawValue) || 0;
    else if (field === "bind") c.bind = Math.max(0, Number(rawValue) || 0);
    else if (field === "accel") c.accel = Math.max(0, Number(rawValue) || 0);
  });
}

function toggleParalyze(id) {
  mutate((s) => {
    const c = s.combatants.find((c) => c.id === id);
    if (c) c.paralyze = !c.paralyze;
  });
}

function setDieStatus(combatantId, dieId, status) {
  mutate((s) => {
    const c = s.combatants.find((c) => c.id === combatantId);
    if (!c) return;
    const d = c.dice.find((d) => d.id === dieId);
    if (d) d.status = status;
  });
}

function clamp(v, min, max) {
  v = Number(v);
  if (Number.isNaN(v)) return min;
  return Math.min(max, Math.max(min, v));
}

/* ---------------- rendering ---------------- */

function escapeHtml(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function render() {
  const allDice = [];
  for (const c of state.combatants) {
    for (const d of c.dice) {
      allDice.push({ ...d, combatant: c });
    }
  }
  const available = allDice.filter((d) => d.status === "available").sort((a, b) => b.value - a.value);
  const standby = allDice.filter((d) => d.status === "standby").sort((a, b) => b.value - a.value);

  const trackHtml = available.length
    ? available.map(dieBadgeHtml).join("")
    : `<div class="track-empty">Nenhum dado disponível. Adicione combatentes e role uma nova cena.</div>`;

  const standbyHtml = standby.length
    ? `<div class="standby-row">${standby.map(standbyChipHtml).join("")}</div>`
    : "";

  const sortedCombatants = [...state.combatants].sort((a, b) => {
    const ah = Math.max(0, ...a.dice.filter((d) => d.status === "available").map((d) => d.value));
    const bh = Math.max(0, ...b.dice.filter((d) => d.status === "available").map((d) => d.value));
    return bh - ah;
  });

  const listHtml = sortedCombatants.length
    ? sortedCombatants.map(combatantCardHtml).join("")
    : `<div class="empty-state"><span class="big">⚙</span>Nenhum combatente na cena.<br/>Use "Adicionar combatente" para começar.</div>`;

  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-row">
        <div class="title">Star of the City<small>Iniciativa — Dados de Velocidade</small></div>
        <div class="scene-pill">Cena <b>${state.sceneCount}</b></div>
      </div>
      <div class="actions-row">
        <button class="btn btn-brass" data-action="new-scene">🎲 Nova Cena</button>
        <button class="btn btn-ghost btn-sm" data-action="toggle-legend" title="Ajuda">?</button>
      </div>
      <div class="legend ${uiFlags.legendOpen ? "open" : ""}">
        <b>● Disponível</b> — clique no dado para marcá-lo como usado.<br/>
        <b>● Usado</b> — clique em ↺ no card do combatente para reciclar (ex: Esquiva) ou desmarcar.<br/>
        <b>● Standby</b> — dado guardado (Deploy/Counter); use ▶ para gastá-lo ou ↩ para devolvê-lo.<br/>
        <b>Bind</b> reduz, <b>Aceleração</b> soma, <b>Paralisado</b> trava o dado em 1 na próxima rolagem.
      </div>
    </div>

    <div class="track-section">
      <div class="section-label">Trilha de Iniciativa</div>
      <div class="track">${trackHtml}</div>
      ${standbyHtml}
    </div>

    <button class="add-toggle" data-action="toggle-add">
      <span>${uiFlags.addOpen ? "▾" : "▸"} Adicionar combatente</span>
    </button>
    <form class="add-form ${uiFlags.addOpen ? "open" : ""}" data-form="add">
      <div class="field-grid full">
        <div>
          <label>Nome</label>
          <input type="text" name="name" placeholder="Nome do combatente" required />
        </div>
      </div>
      <div class="field-grid full">
        <div>
          <label>Tipo</label>
          <div class="type-toggle" data-type-toggle>
            <button type="button" class="type-pc active" data-action="set-type" data-type="pc">Jogador</button>
            <button type="button" class="type-ally" data-action="set-type" data-type="ally">Aliado</button>
            <button type="button" class="type-enemy" data-action="set-type" data-type="enemy">Inimigo</button>
          </div>
          <input type="hidden" name="type" value="pc" />
        </div>
      </div>
      <div class="field-grid">
        <div>
          <label>Qtd. de Dados (1–10)</label>
          <input type="number" name="diceCount" min="1" max="10" value="3" />
        </div>
        <div>
          <label>Tamanho do Dado</label>
          <select name="diceSize">
            ${DICE_SIZES.map((s) => `<option value="${s}" ${s === 8 ? "selected" : ""}>d${s}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="field-grid">
        <div>
          <label>Valor Bruto</label>
          <input type="number" name="bruto" value="0" />
        </div>
        <div></div>
      </div>
      <div class="actions-row">
        <button type="submit" class="btn btn-brass">Adicionar</button>
        <button type="button" class="btn btn-ghost" data-action="toggle-add">Cancelar</button>
      </div>
    </form>

    <div class="list-wrap">${listHtml}</div>
  `;
}

function dieBadgeHtml(d) {
  const type = d.combatant.type;
  const title = `${escapeHtml(d.combatant.name)} — ${escapeHtml(d.breakdown)}`;
  return `<div class="die-badge type-${type}" data-action="mark-used" data-cid="${d.combatant.id}" data-did="${d.id}" title="${title}">
    ${d.value}
    <span class="die-tag">${escapeHtml(d.combatant.name)}</span>
  </div>`;
}

function standbyChipHtml(d) {
  const title = `${escapeHtml(d.combatant.name)} — ${escapeHtml(d.breakdown)}`;
  return `<div class="standby-chip" title="${title}">
    <span class="val">${d.value}</span>
    <span style="color:var(--ink-faint);font-weight:400;">${escapeHtml(shortName(d.combatant.name))}</span>
    <button data-action="deploy" data-cid="${d.combatant.id}" data-did="${d.id}" title="Usar dado">▶</button>
    <button data-action="release" data-cid="${d.combatant.id}" data-did="${d.id}" title="Devolver para disponível">↩</button>
  </div>`;
}

function shortName(name) {
  return name.length > 12 ? name.slice(0, 11) + "…" : name;
}

function combatantCardHtml(c) {
  const hasAvailable = c.dice.some((d) => d.status === "available");
  const isDeleting = uiFlags.confirmDelete === c.id;
  const diceChips = c.dice
    .map((d) => {
      if (d.status === "available") {
        return `<div class="die-chip available" data-action="mark-used" data-cid="${c.id}" data-did="${d.id}" title="${escapeHtml(d.breakdown)} — clique para usar">
          ${d.value}
        </div>`;
      }
      if (d.status === "used") {
        return `<div class="die-chip used" title="${escapeHtml(d.breakdown)} — usado">
          ${d.value}
          <button data-action="release" data-cid="${c.id}" data-did="${d.id}" title="Reciclar / desmarcar">↺</button>
        </div>`;
      }
      return `<div class="die-chip standby" title="${escapeHtml(d.breakdown)} — em standby">
        ${d.value}
        <button data-action="deploy" data-cid="${c.id}" data-did="${d.id}" title="Usar dado">▶</button>
        <button data-action="release" data-cid="${c.id}" data-did="${d.id}" title="Devolver para disponível">↩</button>
      </div>`;
    })
    .join("");

  return `
  <div class="card type-${c.type} ${hasAvailable ? "" : "exhausted"}">
    <div class="card-head">
      <span class="type-dot type-${c.type}"></span>
      <input class="card-name" data-action="rename" data-cid="${c.id}" value="${escapeHtml(c.name)}" />
      <button class="btn btn-icon btn-ghost" data-action="reroll" data-cid="${c.id}" title="Rolar novamente">🎲</button>
      <button class="btn btn-icon ${isDeleting ? "btn-danger" : "btn-ghost"}" data-action="delete" data-cid="${c.id}" title="${isDeleting ? "Confirmar exclusão" : "Remover combatente"}">${isDeleting ? "✓" : "✕"}</button>
    </div>
    <div class="card-body">
      <div class="stat-row">
        <div class="stat-field">
          <span class="lbl">Tipo</span>
          <select data-action="update" data-field="type" data-cid="${c.id}">
            ${Object.entries(TYPE_LABEL).map(([k, v]) => `<option value="${k}" ${c.type === k ? "selected" : ""}>${v}</option>`).join("")}
          </select>
        </div>
        <div class="stat-field">
          <span class="lbl">Dados</span>
          <input type="number" min="1" max="10" value="${c.diceCount}" data-action="update" data-field="diceCount" data-cid="${c.id}" />
        </div>
        <div class="stat-field">
          <span class="lbl">Tam.</span>
          <select data-action="update" data-field="diceSize" data-cid="${c.id}">
            ${DICE_SIZES.map((s) => `<option value="${s}" ${c.diceSize === s ? "selected" : ""}>d${s}</option>`).join("")}
          </select>
        </div>
        <div class="stat-field">
          <span class="lbl">Bruto</span>
          <input type="number" value="${c.bruto}" data-action="update" data-field="bruto" data-cid="${c.id}" />
        </div>
        <div class="stat-field">
          <span class="lbl">Bind</span>
          <input type="number" min="0" value="${c.bind}" data-action="update" data-field="bind" data-cid="${c.id}" />
        </div>
        <div class="stat-field">
          <span class="lbl">Acel.</span>
          <input type="number" min="0" value="${c.accel}" data-action="update" data-field="accel" data-cid="${c.id}" />
        </div>
        <button class="status-toggle ${c.paralyze ? "on paralyze" : ""}" data-action="paralyze" data-cid="${c.id}" title="Paralisado: trava o dado em 1 na próxima rolagem">
          ❄ Paralisado
        </button>
      </div>
      <div class="die-row">${diceChips || `<span style="color:var(--ink-faint);font-size:11px;">Sem dados rolados.</span>`}</div>
    </div>
  </div>`;
}

/* ---------------- event delegation ---------------- */

app.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;

  const action = btn.dataset.action;
  const cid = btn.dataset.cid;
  const did = btn.dataset.did;

  if (action === "new-scene") {
    if (state.combatants.length === 0) return;
    rollNewScene();
  } else if (action === "toggle-add") {
    uiFlags.addOpen = !uiFlags.addOpen;
    render();
  } else if (action === "toggle-legend") {
    uiFlags.legendOpen = !uiFlags.legendOpen;
    render();
  } else if (action === "mark-used") {
    setDieStatus(cid, did, "used");
  } else if (action === "release") {
    setDieStatus(cid, did, "available");
  } else if (action === "deploy") {
    setDieStatus(cid, did, "used");
  } else if (action === "reroll") {
    rerollCombatant(cid);
  } else if (action === "paralyze") {
    toggleParalyze(cid);
  } else if (action === "delete") {
    if (uiFlags.confirmDelete === cid) {
      uiFlags.confirmDelete = null;
      removeCombatant(cid);
    } else {
      uiFlags.confirmDelete = cid;
      render();
      setTimeout(() => {
        if (uiFlags.confirmDelete === cid) {
          uiFlags.confirmDelete = null;
          render();
        }
      }, 3000);
    }
  } else if (action === "set-type") {
    const form = btn.closest("form");
    form.querySelectorAll("[data-type-toggle] button").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    form.querySelector('input[name="type"]').value = btn.dataset.type;
  }
});

app.addEventListener("change", (e) => {
  const el = e.target;
  if (el.dataset.action === "update") {
    updateField(el.dataset.cid, el.dataset.field, el.value);
  } else if (el.dataset.action === "rename") {
    updateField(el.dataset.cid, "name", el.value);
  }
});

app.addEventListener("submit", (e) => {
  if (e.target.dataset.form === "add") {
    e.preventDefault();
    const fd = new FormData(e.target);
    addCombatant({
      name: (fd.get("name") || "").toString().trim() || "Combatente",
      type: fd.get("type"),
      diceCount: Number(fd.get("diceCount")),
      diceSize: Number(fd.get("diceSize")),
      bruto: Number(fd.get("bruto")) || 0,
    });
    uiFlags.addOpen = false;
    render();
  }
});

/* ---------------- bootstrap ---------------- */

function showFallback(icon, title, text) {
  app.innerHTML = `
    <div class="fallback">
      <div class="big">${icon}</div>
      <h2>${title}</h2>
      <p>${text}</p>
    </div>
  `;
}

if (!OBR.isAvailable) {
  showFallback(
    "⚙",
    "Fora do Owlbear Rodeo",
    "Esta ferramenta funciona como uma extensão dentro de uma sala do Owlbear Rodeo. Instale-a pelo seu perfil e ative-a na sala para começar."
  );
} else {
  showFallback("⏳", "Carregando…", "Conectando à cena.");
  OBR.onReady(async () => {
    async function trySceneInit() {
      const ready = await OBR.scene.isReady();
      if (ready) {
        await initScene();
      } else {
        showFallback("🗺", "Nenhuma cena aberta", "Abra ou crie uma cena no Owlbear Rodeo para usar o rastreador de iniciativa.");
      }
    }
    OBR.scene.onReadyChange((ready) => {
      if (ready) initScene();
      else showFallback("🗺", "Nenhuma cena aberta", "Abra ou crie uma cena no Owlbear Rodeo para usar o rastreador de iniciativa.");
    });
    await trySceneInit();
  });
}

async function initScene() {
  const metadata = await OBR.scene.getMetadata();
  state = metadata[META_KEY] || defaultState();
  render();
  OBR.scene.onMetadataChange((metadata) => {
    const incoming = metadata[META_KEY];
    if (incoming) {
      state = incoming;
      render();
    }
  });
}
</script>
